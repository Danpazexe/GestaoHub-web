name: 🚦 CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo ref (economiza minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Menor privilégio possível para o token do workflow.
permissions:
  contents: read

jobs:
  quality:
    name: 🔍 Qualidade
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⬇️ Checkout do código
        uses: actions/checkout@v5

      - name: ⚙️ Configurar Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🧹 Lint (ESLint)
        id: lint
        run: npm run lint

      - name: 🧪 Testes (Vitest)
        id: test
        run: npm test

      - name: 🏗️ Build de produção
        id: build
        run: npm run build

      - name: 📋 Resumo do pipeline
        if: always()
        run: |
          {
            echo "## 🚦 GestãoHub — Pipeline de Qualidade"
            echo ""
            echo "| Etapa | Resultado |"
            echo "| :--- | :---: |"
            echo "| 🧹 Lint (ESLint)    | ${{ steps.lint.outcome == 'success' && '✅ passou' || steps.lint.outcome == 'skipped' && '⏭️ pulado' || '❌ falhou' }} |"
            echo "| 🧪 Testes (Vitest)  | ${{ steps.test.outcome == 'success' && '✅ passou' || steps.test.outcome == 'skipped' && '⏭️ pulado' || '❌ falhou' }} |"
            echo "| 🏗️ Build (Vite)     | ${{ steps.build.outcome == 'success' && '✅ passou' || steps.build.outcome == 'skipped' && '⏭️ pulado' || '❌ falhou' }} |"
            echo ""
            echo "> Commit \`${GITHUB_SHA::7}\` · branch \`${GITHUB_REF_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  audit:
    name: 🔒 Segurança das dependências
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: ⬇️ Checkout do código
        uses: actions/checkout@v5

      - name: ⚙️ Configurar Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: 📦 Instalar dependências
        run: npm ci

      # Informativo: reporta vulnerabilidades de produção sem bloquear o merge.
      - name: 🔒 npm audit (produção)
        run: |
          echo "## 🔒 Auditoria de dependências (produção)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm audit --omit=dev --audit-level=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  notificar:
    name: 📲 Notificar Telegram
    needs: [quality, audit]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      # Envia o status do pipeline pro Telegram (gratuito e oficial).
      # Segredos do repo: TELEGRAM_TO (teu chat_id) e TELEGRAM_BOT_TOKEN.
      - name: 📲 Enviar status para o Telegram
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          disable_web_page_preview: true
          message: |
            🚦 GestãoHub-web — ${{ needs.quality.result == 'success' && '✅ passou' || '❌ falhou' }}
            🌿 ${{ github.ref_name }} · 👤 ${{ github.actor }}
            📝 ${{ github.event.head_commit.message || github.event.pull_request.title }}
            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
