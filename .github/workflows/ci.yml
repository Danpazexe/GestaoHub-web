name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Testes (Vitest)
        run: npm test

      - name: Build de produção
        run: npm run build

  audit:
    name: Audit de dependências
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      # Não bloqueia o pipeline: apenas reporta vulnerabilidades de produção.
      - name: npm audit (informativo)
        run: npm audit --omit=dev || true
