name: 🚦 CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo ref (economiza minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Menor privilégio possível para o token do workflow.
permissions:
  contents: read

jobs:
  quality:
    name: 🔍 Qualidade
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Expõe o resultado de cada etapa para o job de notificação.
    outputs:
      lint: ${{ steps.lint.outcome }}
      test: ${{ steps.test.outcome }}
      build: ${{ steps.build.outcome }}
    steps:
      - name: ⬇️ Checkout do código
        uses: actions/checkout@v5

      - name: ⚙️ Configurar Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🧹 Lint (ESLint)
        id: lint
        run: npm run lint

      - name: 🧪 Testes (Vitest)
        id: test
        run: npm test

      - name: 🏗️ Build de produção
        id: build
        run: npm run build

      - name: 📋 Resumo do pipeline
        if: always()
        run: |
          {
            echo "## 🚦 GestãoHub — Pipeline de Qualidade"
            echo ""
            echo "| Etapa | Resultado |"
            echo "| :--- | :---: |"
            echo "| 🧹 Lint (ESLint)    | ${{ steps.lint.outcome == 'success' && '✅ passou' || steps.lint.outcome == 'skipped' && '⏭️ pulado' || '❌ falhou' }} |"
            echo "| 🧪 Testes (Vitest)  | ${{ steps.test.outcome == 'success' && '✅ passou' || steps.test.outcome == 'skipped' && '⏭️ pulado' || '❌ falhou' }} |"
            echo "| 🏗️ Build (Vite)     | ${{ steps.build.outcome == 'success' && '✅ passou' || steps.build.outcome == 'skipped' && '⏭️ pulado' || '❌ falhou' }} |"
            echo ""
            echo "> Commit \`${GITHUB_SHA::7}\` · branch \`${GITHUB_REF_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  audit:
    name: 🔒 Segurança das dependências
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: ⬇️ Checkout do código
        uses: actions/checkout@v5

      - name: ⚙️ Configurar Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: 📦 Instalar dependências
        run: npm ci

      # Informativo: reporta vulnerabilidades de produção sem bloquear o merge.
      - name: 🔒 npm audit (produção)
        run: |
          echo "## 🔒 Auditoria de dependências (produção)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm audit --omit=dev --audit-level=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  notificar:
    name: 📲 Notificar Telegram
    needs: [quality, audit]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      # Monta uma mensagem rica (HTML) com o resultado de cada etapa e envia
      # ao Telegram via API. Segredos: TELEGRAM_TO e TELEGRAM_BOT_TOKEN.
      - name: 📲 Enviar status para o Telegram
        env:
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          QUALITY: ${{ needs.quality.result }}
          OUT_LINT: ${{ needs.quality.outputs.lint }}
          OUT_TEST: ${{ needs.quality.outputs.test }}
          OUT_BUILD: ${{ needs.quality.outputs.build }}
          AUDIT: ${{ needs.audit.result }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          icon() { case "$1" in
            success) printf '✅';; failure) printf '❌';;
            cancelled) printf '🚫';; skipped|"") printf '⏭️';; *) printf '❔';;
          esac; }
          esc() { printf '%s' "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }

          if [ "$QUALITY" = "success" ]; then HEAD="✅ CI passou"; else HEAD="❌ CI falhou"; fi
          COMMIT_FIRST=${COMMIT_MSG%%$'\n'*}

          MSG=$(printf '%s\n' \
            "🚦 <b>GestãoHub-web</b> · <b>${HEAD}</b>" \
            "" \
            "🧹 Lint $(icon "$OUT_LINT")   🧪 Testes $(icon "$OUT_TEST")" \
            "🏗️ Build $(icon "$OUT_BUILD")   🔒 Audit $(icon "$AUDIT")" \
            "" \
            "🌿 <code>$(esc "$BRANCH")</code> · 👤 $(esc "$ACTOR")" \
            "📝 <code>${SHA:0:7}</code> $(esc "$COMMIT_FIRST")" \
            "" \
            "🔗 <a href=\"${RUN_URL}\">Ver execução no GitHub</a>")

          PAYLOAD=$(jq -n --arg chat "$TELEGRAM_TO" --arg text "$MSG" \
            '{chat_id:$chat, text:$text, parse_mode:"HTML", disable_web_page_preview:true}')
          RESP=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' -d "$PAYLOAD")
          echo "Resposta do Telegram: $RESP"
          echo "$RESP" | jq -e '.ok == true' > /dev/null
