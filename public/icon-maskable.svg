      <stop offset="0" stop-color="#283044"/>
      <stop offset="1" stop-color="#161c2b"/>
    </linearGradient>
    <linearGradient id="emberm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fc964e"/>
